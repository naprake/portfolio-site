<script>

const cursor = document.querySelector(".custom-cursor");
const links = document.querySelectorAll("a");
const buttons = document.querySelectorAll("button");
let isCursorInited = false;

const initCursor = () => {
  cursor.classList.add("custom-cursor--init");
  isCursorInited = true;
};

const destroyCursor = () => {
  cursor.classList.remove("custom-cursor--init");
  isCursorInited = false;
};

links.forEach((link) => {
  link.addEventListener("mouseover", () => {
    cursor.classList.add("custom-cursor--link");
  });

  link.addEventListener("mouseout", () => {
    cursor.classList.remove("custom-cursor--link");
  });
});

buttons.forEach((button) => {
  button.addEventListener("mouseover", () => {
    cursor.classList.add("custom-cursor--link");
  });

  button.addEventListener("mouseout", () => {
    cursor.classList.remove("custom-cursor--link");
  });
});

document.addEventListener("mousemove", (e) => {
  const mouseX = e.clientX;
  const mouseY = e.clientY;

  if (!isCursorInited) {
    initCursor();
  }

  cursor.style = `translate: ${mouseX}px ${mouseY}px`;
});

document.addEventListener("mouseout", destroyCursor);

const seeMore = document.querySelectorAll('.open-close');

seeMore.forEach(function(item) {
    item.addEventListener('click', function(e) {
        const parent = e.currentTarget.parentElement.parentElement.parentElement.parentElement;
        parent.classList.toggle('show-more');
    })
})

</script>

<script>

const scroller = document.querySelector(".projects");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");

if (lightbox && lightboxImg) {
    scroller.addEventListener("click", (e) => {
        const target = e.target;
        if (target && target.tagName === "IMG") {
            lightboxImg.src = target.src;
            lightbox.classList.add("open");
        }
    });

    lightbox.addEventListener("click", (e) => {
        if (e.target === lightboxImg) return;
        lightbox.classList.remove("open");
    });
} else {
    console.warn("Lightbox elements not found; skipping lightbox setup.");
}

</script>
